model_name: wan
generator_name: local_conditioning_wan
#generator_name: wan  # for finetuning with original Wan model, not local conditioning Wan
load_optimizer: false  # whether to load optimizer state from checkpoint if from_ckpt is given

generator_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size

num_train_timestep: 1000
timestep_shift: 8.0  # tune if needed
denoising_loss_type: flow
mixed_precision: true
seed: 0
wandb_host: https://api.wandb.ai
wandb_key: <your_wandb_key_here>
wandb_entity: <your_wandb_entity_here>
wandb_project: <your_wandb_project_here>
wandb_name: physvid-finetune-2e6
output_path: data/wisa80k/wandb_runs/physvid-finetune-2e6
sharding_strategy: full
fsdp_use_orig_params: false
generator_lr: 2e-06
beta1: 0.9
beta2: 0.999
data_path: data/wisa80k/videos_filtered_train.json
latents_map: data/wisa80k/wisa80k_latents_lmdb_v2
video_data_shape: [81, 3, 480, 832]
batch_size: 16
log_iters: 100
total_iters: 10000
negative_prompt: 'Unrealistic colors, overexposed, static, blurred details, subtitles, style, artwork, painting, image, still, overall gray, worst quality, low quality, JPEG compression residue, ugly, mutilated, extra fingers, deformed, disfigured, malformed limbs, fused fingers, still image, cluttered background, three legs, walking backwards, antigravity, frictionless, lowres, blurry, fuzzy, out of focus, extra limbs, cloned face, missing arms, missing legs, extra arms, extra legs, too many fingers, bad physics, reversed gravity, reversed time'
image_or_video_shape:
- 16
- 21
- 16
- 60
- 104
gradient_checkpointing: true
num_frame_per_block: 3
empty_prompt_prob: 0.1
train_new_layers_only: false
